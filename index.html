<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracking - Web AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <!-- PWA Manifest & PWA Metas -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6610f2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js for Executive Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- JsBarcode API for dynamic visual Code128 creation -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- Tesseract.js for Free Client-Side OCR -->
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- App Header -->
        <header class="app-header">
            <div class="header-content">
                <div style="display:flex; align-items:center; gap:10px;">
                  <button class="back-btn" id="back-btn" onclick="history.back()">
                    <i data-lucide="arrow-left"></i>
                    <span>Back</span>
                  </button>
                  <div class="logo-wrap" id="logo-wrap">
                    <div class="logo-dot"></div>
                    <h1 class="logo">Inventory<span>AI</span></h1>
                  </div>
                </div>
                <div style="display:flex; gap:8px; align-items:center;">
                <button class="scan-fab" id="global-scanner-btn" aria-label="Scan Barcode">
                    <i data-lucide="scan-line" style="width:18px; height:18px;"></i>
                    <span>SCAN</span>
                </button>
                <button class="icon-btn" id="theme-toggle-btn" onclick="App.toggleTheme()" aria-label="Toggle Theme">
                    <i data-lucide="moon"></i>
                </button>
                <button class="icon-btn" aria-label="Settings">
                        <i data-lucide="settings"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area (Dynamic Routing) -->
        <main id="main-content" class="page-container">
            <!-- Content injected via JS -->
        </main>

        <!-- Bottom Nav -->
    <nav class="bottom-nav" id="main-bottom-nav">
        <a href="#dashboard" class="nav-item active" data-route="dashboard" data-allowed-roles="admin,receiver,cashier,standard">
            <div class="nav-icon-wrap"><i data-lucide="pie-chart"></i></div>
            <span>Dashboard</span>
        </a>
        <a href="#departments" class="nav-item" data-route="departments" data-allowed-roles="admin,receiver,cashier,standard">
            <div class="nav-icon-wrap"><i data-lucide="database"></i></div>
            <span>Database</span>
        </a>
            <button class="nav-item" data-route="tools" data-allowed-roles="admin,receiver" onclick="Router.navigate('tools')">
                <div class="nav-icon-wrap"><i data-lucide="cpu"></i></div>
                <span>AI Tools</span>
            </button>
            <button class="nav-item" data-route="receiving" data-allowed-roles="admin,receiver" onclick="Router.navigate('receiving')">
                <div class="nav-icon-wrap"><i data-lucide="truck"></i></div>
                <span>Receiving</span>
            </button>
            <button class="nav-item" data-route="sales" data-allowed-roles="admin,cashier" onclick="Router.navigate('sales')">
                <div class="nav-icon-wrap"><i data-lucide="shopping-cart"></i></div>
                <span>EOD Sales</span>
            </button>
        </nav>
    </div>

    <!-- Modals and Overlays -->
    <div id="modal-container" class="modal-backdrop hidden">
        <div class="modal-content glass-panel" id="modal-body">
            <!-- Modal injected via JS -->
        </div>
    </div>

    <!-- Firebase Compat    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-functions-compat.js"></script>
    <!-- Free Real AI Libraries (100% Client Side in Browser) -->
    <!-- TensorFlow.js & COCO-SSD for Object/Box Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="hidden">
      <div class="pin-screen">
         <div class="pin-logo">
           <div class="pin-logo-icon"><i data-lucide="shield-check" style="width:32px;height:32px;color:#fff"></i></div>
           <h1 class="logo" style="font-size:2rem; margin-top:12px">Inventory<span style="color:var(--primary)">AI</span></h1>
           <p style="color:var(--text-muted); font-size:14px; margin-top:6px">Secure Warehouse Access</p>
         </div>
         <div class="pin-dots" id="pin-dots">
           <div class="pin-dot" id="dot-1"></div>
           <div class="pin-dot" id="dot-2"></div>
           <div class="pin-dot" id="dot-3"></div>
           <div class="pin-dot" id="dot-4"></div>
         </div>
         <p id="auth-status-msg" style="text-align:center; font-size:13px; color:var(--danger); min-height:20px; margin-bottom:8px;"></p>
         <div class="pin-keypad">
           <button class="pin-key" onclick="App.pinPress('1')">1</button>
           <button class="pin-key" onclick="App.pinPress('2')">2</button>
           <button class="pin-key" onclick="App.pinPress('3')">3</button>
           <button class="pin-key" onclick="App.pinPress('4')">4</button>
           <button class="pin-key" onclick="App.pinPress('5')">5</button>
           <button class="pin-key" onclick="App.pinPress('6')">6</button>
           <button class="pin-key" onclick="App.pinPress('7')">7</button>
           <button class="pin-key" onclick="App.pinPress('8')">8</button>
           <button class="pin-key" onclick="App.pinPress('9')">9</button>
           <button class="pin-key pin-key-empty"></button>
           <button class="pin-key" onclick="App.pinPress('0')">0</button>
           <button class="pin-key pin-key-del" onclick="App.pinDel()"><i data-lucide="delete" style="width:20px;height:20px"></i></button>
         </div>
         <input type="hidden" id="auth-pin" value="">
      </div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/router.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker Registered offline PWA!'))
            .catch(err => console.log('SW Registration failed', err));
        });
      }
    </script>
</body>
</html>
